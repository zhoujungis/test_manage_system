name: backend

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_DB: testmanager_test
          POSTGRES_USER: testmanager
          POSTGRES_PASSWORD: testmanager
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SECRET_KEY: ci-secret-key-for-tests-only-1234567890abcdef
      DJANGO_DEBUG: 'True'
      DJANGO_ALLOWED_HOSTS: '*'
      DJANGO_CACHE_BACKEND: locmem
      DB_NAME: testmanager_test
      DB_USER: testmanager
      DB_PASSWORD: testmanager
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      CORS_ALLOWED_ORIGINS: http://localhost:3001

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install argon2-cffi

      - name: Verify migration consistency
        working-directory: backend
        run: python manage.py makemigrations --check --dry-run

      - name: Django system check
        working-directory: backend
        run: python manage.py check

      - name: Static verification of fix script
        run: python verify_fixes.py

      - name: Run tests
        working-directory: backend
        run: |
          python manage.py migrate
          # C8 fix: 显式列 test labels，避免依赖 __init__.py + discovery
          python manage.py test apps.accounts apps.projects apps.testcases apps.testplans apps.testruns apps.defects --noinput -v 2
